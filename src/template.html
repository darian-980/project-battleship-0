<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Vend+Sans:ital,wght@0,300..700;1,300..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="gameStart" style="display:none">
        <p>Choose player 2 type:</p>
        <div class="buttonList">
            <div class="button" id="player">Real Player</div>
            <div class="button" id="CPU">CPU</div>
        </div>
    </div>
    <div class="playerSetBoard" style="display:flex" id="1">
        <div class="vertical">
            <p>Player 1 Choose Ships:</p>
            <div class="fourAxisGrid" id="1">
                <div class="fillerX"></div>
                <div class="axisX" id="1"></div>
                <div class="axisY" id="1"></div>
                <div class="chooseShipsBoard" id="1"></div>
            </div>
        </div>

    </div>
    <div class="playerSetBoard" style="display:none" id="2">
        <div class="vertical">
            <p>Player 2 Choose Ships:</p>
            <div class="fourAxisGrid" id="2">
                <div class="fillerX"></div>
                <div class="axisX" id="2"></div>
                <div class="axisY" id="2"></div>
                <div class="chooseShipsBoard" id="2"></div>
            </div>
        </div>

    </div>
    <div class="winnerContainer" style="display:none"></div> <!--  hide Winnerboard by default -->
    <div class="passTurn" style="display:none">
        <div class="buttonList">
            <div class="button" id="turn">Pass Turn</div>
        </div>
    </div>
    <div class="container" style="display:none">
        <div class="vertical" id="1">
            <p>Player 1</p>
            <p>Enemy Field</p>
            <div class="fourAxisGrid" id="1">
                <div class="fillerX"></div>
                <div class="axisX" id="1"></div>
                <div class="axisY" id="1"></div>
                <div class="board" id="1"></div>
            </div>
            <div class="small-board" id="2"></div>
            <p>Your Field</p>
            <div class="passButton" id="1" style="visibility:hidden">Done</div>
        </div>

        <div class="vertical" id="2">
            <p>Player 2</p>
            <p>Enemy Field</p>
            <div class="fourAxisGrid" id="2">
                <div class="fillerX"></div>
                <div class="axisX" id="2"></div>
                <div class="axisY" id="2"></div>
                <div class="board" id="2"></div>
            </div>
            <div class="small-board" id="1"></div>
            <p>Your Field</p>
            <div class="passButton" id="2" style="visibility:hidden">Done</div>
        </div>
    </div>
    </div>

</body>

</html>
